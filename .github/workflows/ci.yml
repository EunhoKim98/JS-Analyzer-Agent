# CI(빌드 검증) — push/PR에서 코어 바이너리 + Burp JAR을 실제로 빌드해본다(배포 없음).
# 릴리스 전에 M5 Java 컴파일과 패키징을 검증하는 안전한 첫 빌드 경로. 산출물은 artifact로만.
name: ci

on:
  push:
    branches: ['**']
    tags-ignore: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4

      - name: Install deps (skip browser download)
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: npm ci

      - name: Typecheck core
        run: ./node_modules/.bin/tsc --noEmit

      - name: Package core (linux-x64) + build Burp JAR
        run: |
          set -euo pipefail
          scripts/package-core.sh bun-linux-x64 dist/linux-x64
          ( cd dist/linux-x64 && zip -qr core.zip . )
          mkdir -p burp/src/main/resources
          cp dist/linux-x64/core.zip burp/src/main/resources/core.zip
          ( cd burp && gradle --no-daemon shadowJar -PappVersion=ci )
          ls -lh burp/build/libs

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: js-analyzer-burp-ci
          path: burp/build/libs/*.jar
