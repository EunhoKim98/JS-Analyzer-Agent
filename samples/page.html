<!doctype html>
<html>
<head><meta charset="utf-8"><title>discovery test page</title></head>
<body>
  <div id="app"></div>
  <!-- external script: must be discovered via network response -->
  <script src="ext.js"></script>
  <!-- inline script: must be discovered via DOM -->
  <script>
    // open redirect: ?to= flows into location.href
    var n = new URLSearchParams(location.search).get('to');
    if (n) { location.href = n; }
  </script>
</body>
</html>
